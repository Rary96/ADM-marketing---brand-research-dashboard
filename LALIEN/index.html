<script>

let DATA = FALLBACK_ROWS.map(r => ({section:r[0],category:r[1],label:r[2],value:r[3],detail:r[4]}));

function bySection(s){ return DATA.filter(r => r.section === s); }

// ---------------- RENDER FUNCTIONS ----------------
function renderOverview(){
  const rows = bySection("METRICHE_GENERALI");
  const cards = rows.map(r => `
    <div class="glass rounded-xl p-5">
      <div class="text-[10px] tracking-widest text-gray-500 mb-1">${r.category.toUpperCase()}</div>
      <div class="text-white text-lg font-light mb-1">${r.label}</div>
      <div class="accent text-sm mb-2">${r.value}</div>
      <div class="text-xs text-gray-500">${r.detail}</div>
    </div>`).join('');
  return `
    <div class="mb-8">
      <h2 class="text-2xl font-light text-white mb-1">Overview</h2>
      <p class="text-sm text-gray-500">Metriche generali di mercato e identità core del brand LALIEN.</p>
    </div>
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">${cards}</div>`;
}

function renderIdentity(){
  const pillars = bySection("CONTENT_PILLAR");
  const pillarCards = pillars.map(p => `
    <div class="glass rounded-xl p-5">
      <div class="text-[10px] tracking-widest accent mb-1">${p.category.toUpperCase()}</div>
      <div class="text-white font-light mb-2">${p.label}</div>
      <div class="text-xs text-gray-500">${p.detail} · <span class="text-gray-400">${p.value}</span></div>
    </div>`).join('');
  return `
    <div class="mb-8">
      <h2 class="text-2xl font-light text-white mb-1">Brand Identity</h2>
      <p class="text-sm text-gray-500">Vision, storytelling e pilastri di contenuto.</p>
    </div>
    <div class="glass rounded-xl p-6 mb-6">
      <div class="text-[10px] tracking-widest text-gray-500 mb-2">MANIFESTO</div>
      <div class="text-2xl text-white font-light leading-relaxed">"Set a new standard.<br><span class="accent">Yours.</span>"</div>
      <p class="text-sm text-gray-400 mt-4 max-w-2xl">LALIEN trasforma l'idea di "stranger" in appartenenza — from bad quality to top quality, from stranger to you. Un'identità aliena e duale che diventa codice di riconoscimento per la LALIEN Tribe.</p>
    </div>
    <h3 class="text-sm tracking-widest text-gray-500 mb-3">CONTENT PILLARS</h3>
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">${pillarCards}</div>`;
}

function renderCompetitor(){
  const rows = bySection("COMPETITOR");
  const groups = {};
  rows.forEach(r => { (groups[r.category] = groups[r.category]||[]).push(r); });

  for(const [cat, items] of Object.entries(groups)){
    html += `<h3 class="text-sm tracking-widest text-gray-500 mb-3 mt-6">${cat.toUpperCase()}</h3><div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">`;
    html += items.map(i => `
      <div class="glass rounded-xl p-5">
        <div class="text-white font-light mb-1">${i.label}</div>
        <div class="accent text-xs mb-2">${i.value}</div>
        <div class="text-xs text-gray-500">${i.detail}</div>
      </div>`).join('');
    html += `</div>`;
  }
  return html;
}

function renderSeo(){
  const rows = bySection("SEO_KEYWORD");

function renderSwot(){
  const rows = bySection("SWOT");
  const map = {Strengths:{title:"Strengths",color:"border-green-500/30"},Weaknesses:{title:"Weaknesses",color:"border-yellow-500/30"},Opportunities:{title:"Opportunities",color:"border-blue-500/30"},Threats:{title:"Threats",color:"border-red-500/30"}};
  let html = `<div class="mb-8"><h2 class="text-2xl font-light text-white mb-1">SWOT Analysis</h2><p class="text-sm text-gray-500">Analisi prospettica per il lancio del brand.</p></div>`;
  html += `<div class="grid grid-cols-1 md:grid-cols-2 gap-5">`;
  for(const [cat, cfg] of Object.entries(map)){
    const items = rows.filter(r => r.category === cat);
    html += `<div class="glass rounded-xl p-5 border-t-2 ${cfg.color}">
      <div class="text-sm tracking-widest text-gray-400 mb-3">${cfg.title.toUpperCase()}</div>
      <div class="space-y-3">`;
    html += items.map(i => `
      <div>
        <div class="text-white text-sm">${i.label}</div>
        <div class="text-xs text-gray-500">${i.detail} · <span class="text-gray-400">${i.value}</span></div>
      </div>`).join('');
    html += `</div></div>`;
  }
  html += `</div>`;
  return html;
}

function renderRoadmap(){
  const rows = bySection("ROADMAP");
  let html = `<div class="mb-8"><h2 class="text-2xl font-light text-white mb-1">Roadmap Go-To-Market</h2><p class="text-sm text-gray-500">Piano di lancio in 4 fasi.</p></div>`;
  html += `<div class="space-y-4">`;
  rows.forEach((r,idx) => {
    html += `
      <div class="glass rounded-xl p-5 flex gap-5 items-start">
        <div class="text-3xl font-thin accent w-14 shrink-0">${String(idx+1).padStart(2,'0')}</div>
        <div>
          <div class="text-white font-light">${r.label}</div>
          <div class="text-xs text-gray-500 mt-1">${r.category} · <span class="text-gray-400">${r.value}</span></div>
          <div class="text-sm text-gray-400 mt-2">${r.detail}</div>
        </div>
      </div>`;
  });
  html += `</div>`;
  return html;
}

const RENDERERS = { overview: renderOverview, identity: renderIdentity, competitor: renderCompetitor, seo: renderSeo, swot: renderSwot, roadmap: renderRoadmap };

function showTab(tab){
  document.querySelectorAll('.tab-btn').forEach(b => {
    if(b.dataset.tab === tab){ b.classList.remove('tab-inactive'); b.classList.add('tab-active'); }
    else { b.classList.remove('tab-active'); b.classList.add('tab-inactive'); }
  });
  const content = document.getElementById('tabContent');
  content.innerHTML = RENDERERS[tab]();
  content.classList.remove('hidden');
}

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => showTab(btn.dataset.tab));
});

function initDashboard(){
  document.getElementById('loadingState').classList.add('hidden');
  showTab('overview');
}

// ---------------- AUTH & DATA FLOW ----------------
async function loadClientData(userId){
  let clientFolder = CLIENT_FALLBACK;
  try {
    const { data: profile, error } = await supabase.from('profiles').select('client').eq('id', userId).single();
    if(!error && profile && profile.client) clientFolder = profile.client;
  } catch(e){ /* fallback resta invariato */ }

  document.getElementById('clientBadge').textContent = 'cliente: ' + clientFolder;
  document.getElementById('clientBadge').classList.remove('hidden');

  try {
    const { data: fileData, error: dlError } = await supabase.storage.from(STORAGE_BUCKET).download(`data/${clientFolder}/data.csv`);
    if(dlError || !fileData) throw dlError || new Error('CSV non trovato');
    const text = await fileData.text();
    const parsed = Papa.parse(text, { header: true, skipEmptyLines: true });
    if(parsed.data && parsed.data.length){
      DATA = parsed.data.map(r => ({section:r.section, category:r.category, label:r.label, value:r.value, detail:r.detail}));
    }
  } catch(e){
    console.warn('Uso dati di fallback locali:', e);
  }
  initDashboard();
}

function showDashboard(session){
  document.getElementById('loginView').classList.add('hidden');
  document.getElementById('dashboardView').classList.remove('hidden');
  loadClientData(session.user.id);
}

function showLogin(){
  document.getElementById('dashboardView').classList.add('hidden');
  document.getElementById('loginView').classList.remove('hidden');
}

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPassword').value;
  const errEl = document.getElementById('loginError');
  errEl.classList.add('hidden');
  const { data, error } = await supabase.auth.signInWithPassword({ email, password });
  if(error){
    errEl.textContent = 'Accesso non riuscito: ' + error.message;
    errEl.classList.remove('hidden');
    return;
  }
  showDashboard(data.session);
});

document.getElementById('logoutBtn').addEventListener('click', async () => {
  await supabase.auth.signOut();
  showLogin();
});

// Sessione persistente al reload
(async () => {
  const { data: { session } } = await supabase.auth.getSession();
  if(session){ showDashboard(session); } else { showLogin(); }
})();

supabase.auth.onAuthStateChange((event, session) => {
  if(event === 'SIGNED_OUT'){ showLogin(); }
});
</script>
